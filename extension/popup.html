<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      padding: 20px;
      font-family: 'Syne', sans-serif;
      background-color: #0e1117;
      color: #ffffff;
      overflow: hidden;
    }

    h3 { font-size: 1.1rem; margin-bottom: 8px; color: #ffffff; }
    p { font-size: 12px; color: #888; margin-bottom: 16px; line-height: 1.6; }

    .step {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 10px;
      font-size: 12px;
      color: #ccc;
    }

    .step span {
      color: #4F8EF7;
      font-weight: 700;
      margin-right: 6px;
    }

    input {
      width: 100%;
      padding: 8px 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: 1px solid #333;
      background-color: #1a1d27;
      color: #ffffff;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #4F8EF7;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      transition: background 0.2s;
      margin-bottom: 8px;
    }

    button:hover { background: #3a7de8; }

    #get-key-btn {
      background: #2a2d3a;
      font-size: 13px;
    }

    #get-key-btn:hover { background: #3a3d4a; }

    select {
      width: 100%;
      padding: 8px 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: 1px solid #333;
      background-color: #1a1d27;
      color: #ffffff;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
    }

    #status {
      margin-top: 12px;
      font-size: 13px;
      color: #888;
      text-align: center;
    }
  </style>
</head>
<body>


  <div id="onboarding">
    <h3>Welcome to Synapse</h3>
    <p>To get started, you need a free Gemini API key. It takes 30 seconds.</p>

    <div class="step"><span>1</span>Click the button below to open Google AI Studio</div>
    <div class="step"><span>2</span>Sign in with your Google account</div>
    <div class="step"><span>3</span>Click "Get API Key" and copy it</div>
    <div class="step"><span>4</span>Paste it below and click Save</div>

    <button id="get-key-btn">
  Open Google AI Studio
</button>

    <input type="text" id="api-key-input" placeholder="Paste your API key here">
    <button id="save-key-btn">Save & Continue</button>
    <div id="onboarding-status"></div>
  </div>

  <div id="main" style="display:none;">
    <h3>Synapse - Research Companion</h3>
    <select id="folderSelect">
      <option value="">No Folder</option>
    </select>
    <button id="saveBtn">Save & Summarize This Page</button>
    <div id="status"></div>
    <button id="dashboard-btn">Open Dashboard</button>
</div>

  <script src="popup.js"></script>
</body>
</html>
