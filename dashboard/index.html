<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research Companion Dashboard</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="header">
    <h1> Research Companion</h1>
    <p>All your saved research in one place</p>
  </div>

  <div class="controls">
    <input type="text" id="searchBar" placeholder="Search your research...">
    <select id="topicFilter">
      <option value="">All Topics</option>
    </select>
  </div>

  <div id="cards-container">
    <!-- cards will be injected here by script.js -->
  </div>

  <script src="script.js"></script>
</body>
</html>
